<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflection Tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --ink: #1a1714;
    --paper: #f4f0e8;
    --cream: #ede8dc;
    --warm-mid: #b5a98e;
    --accent: #6b4c2a;
    --accent-light: #c4a882;
    --muted: #7a7060;
    --line: rgba(107,76,42,0.15);
    --glow: rgba(196,168,130,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--paper);
    overflow: hidden;
  }

  /* Ambient background */
  #ambient {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, #2e2318 0%, #1a1714 60%, #0e0c0a 100%);
    z-index: 0;
  }

  #grain {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
  }

  /* Main container */
  #stage {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* Top status bar */
  #statusbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    z-index: 20;
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(4px);
    background: rgba(14,12,10,0.6);
  }

  #logo {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--warm-mid);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #axis-tracker {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .axis-dot {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    transition: color 0.4s;
  }

  .axis-dot .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s, box-shadow 0.4s;
  }

  .axis-dot.active { color: var(--accent-light); }
  .axis-dot.active .dot {
    background: var(--accent-light);
    box-shadow: 0 0 8px var(--accent-light);
  }
  .axis-dot.done .dot {
    background: var(--warm-mid);
  }

  #time-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Card */
  #card {
    max-width: 640px;
    width: 100%;
    position: relative;
  }

  #node-type-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 1.5rem;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.5s, transform 0.5s;
  }

  #node-type-label.visible { opacity: 1; transform: translateY(0); }

  #node-text {
    font-size: clamp(1.25rem, 3vw, 1.65rem);
    line-height: 1.55;
    color: var(--paper);
    font-weight: 400;
    margin-bottom: 2.5rem;
    min-height: 4rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s 0.1s, transform 0.6s 0.1s;
  }

  #node-text.visible { opacity: 1; transform: translateY(0); }

  #node-text em {
    color: var(--accent-light);
    font-style: italic;
  }

  /* Options */
  #options-container {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s 0.25s, transform 0.6s 0.25s;
  }

  #options-container.visible { opacity: 1; transform: translateY(0); }

  .option-btn {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1rem 1.25rem;
    color: var(--paper);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 1.05rem;
    line-height: 1.4;
    text-align: left;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s, color 0.25s, transform 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--glow);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .option-btn:hover {
    border-color: var(--accent-light);
    transform: translateX(4px);
  }

  .option-btn:hover::before { opacity: 1; }

  .option-btn:active { transform: translateX(2px) scale(0.995); }

  .option-btn.selected {
    border-color: var(--accent-light);
    background: rgba(196,168,130,0.12);
    color: var(--accent-light);
  }

  .option-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--warm-mid);
    letter-spacing: 0.1em;
    padding-top: 0.3rem;
    flex-shrink: 0;
  }

  /* Continue button */
  #continue-btn {
    margin-top: 2rem;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 2px;
    padding: 0.8rem 2rem;
    color: var(--accent-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, transform 0.15s;
    display: none;
    align-items: center;
    gap: 0.75rem;
  }

  #continue-btn:hover {
    background: rgba(107,76,42,0.2);
    border-color: var(--accent-light);
    transform: translateX(3px);
  }

  #continue-btn.visible { display: flex; }

  /* Reflection node specific */
  .reflection-card {
    border-left: 2px solid var(--accent);
    padding-left: 1.25rem;
  }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 20;
    width: 0%;
  }

  /* Summary specific */
  #summary-axes {
    display: flex;
    gap: 1.5rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .summary-axis-card {
    flex: 1;
    min-width: 140px;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.85rem 1rem;
  }

  .summary-axis-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--warm-mid);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .summary-axis-value {
    font-size: 0.95rem;
    color: var(--accent-light);
    font-style: italic;
  }

  /* Animations */
  @keyframes breathe {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Transition overlay */
  #fade-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }

  #fade-overlay.active { opacity: 1; pointer-events: all; }

  /* End screen */
  #end-screen {
    display: none;
    text-align: center;
  }

  #end-screen .end-icon {
    font-size: 2rem;
    margin-bottom: 1.5rem;
    opacity: 0.4;
  }

  #end-screen h2 {
    font-size: 1.5rem;
    font-weight: 400;
    font-style: italic;
    color: var(--accent-light);
    margin-bottom: 1rem;
  }

  #end-screen p {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 2rem;
  }

  #restart-btn {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 0.7rem 1.5rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }

  #restart-btn:hover {
    border-color: var(--warm-mid);
    color: var(--paper);
  }
</style>
</head>
<body>

<div id="ambient"></div>
<div id="grain"></div>
<div id="fade-overlay"></div>

<div id="statusbar">
  <div id="logo">Daily Reflection Tree</div>
  <div id="axis-tracker">
    <div class="axis-dot" id="dot-1"><div class="dot"></div>LOCUS</div>
    <div class="axis-dot" id="dot-2"><div class="dot"></div>ORIENTATION</div>
    <div class="axis-dot" id="dot-3"><div class="dot"></div>RADIUS</div>
  </div>
  <div id="time-display"></div>
</div>

<div id="stage">
  <div id="card">
    <div id="node-type-label"></div>
    <div id="node-text"></div>
    <div id="options-container"></div>
    <button id="continue-btn">Continue →</button>
    <div id="summary-axes" style="display:none"></div>
  </div>

  <div id="end-screen" style="display:none; text-align:center">
    <div class="end-icon">◦</div>
    <h2>That's today.</h2>
    <p>You thought about it honestly — that's more than most people do. See you tomorrow.</p>
    <button id="restart-btn">Start again</button>
  </div>
</div>

<div id="progress-bar"></div>

<script>
// ============================================================
// TREE DATA (embedded — no runtime LLM)
// ============================================================
const TREE = {
  "meta": { "title": "The Daily Reflection Tree", "axes": ["locus","orientation","radius"] },
  "nodes": [
    { "id":"START","parentId":null,"type":"start","text":"Good evening. You made it through another day — that's something.\n\nThis is just a quiet moment to look back, honestly, before tomorrow begins.","options":[],"target":"A0_OPEN","signal":null },
    { "id":"A0_OPEN","parentId":"START","type":"question","text":"Before we go anywhere — how did today actually feel?","options":[{"label":"Heavy — I'm carrying something","value":"heavy"},{"label":"Flat — it just kind of happened","value":"flat"},{"label":"Alive — I felt present","value":"alive"},{"label":"Scattered — pulled in too many directions","value":"scattered"}],"target":null,"signal":null },
    { "id":"A0_BRIDGE","parentId":"A0_OPEN","type":"bridge","text":"Got it. Let's start with how you handled today — not what happened to you, but how you moved through it.","options":[],"target":"A1_Q1","signal":null },
    { "id":"A1_Q1","parentId":"A0_BRIDGE","type":"question","text":"When something didn't go as planned today, where did your mind go first?","options":[{"label":"\"What can I do differently next time?\"","value":"internal_a"},{"label":"\"Why does this keep happening to me?\"","value":"external_a"},{"label":"\"I adapted — found another way through\"","value":"internal_b"},{"label":"\"I waited — hoping someone else would fix it\"","value":"external_b"}],"target":null,"signal":null },
    { "id":"A1_D1","parentId":"A1_Q1","type":"decision","text":null,"routing":[{"condition":"answer=internal_a|internal_b","target":"A1_Q2_INT"},{"condition":"answer=external_a|external_b","target":"A1_Q2_EXT"}],"signal":null },
    { "id":"A1_Q2_INT","parentId":"A1_D1","type":"question","text":"You chose to act — or chose to learn. Think about the hardest moment today. What did you actually do with it?","options":[{"label":"I named the problem out loud and worked on it","value":"int_proactive"},{"label":"I kept moving without addressing it","value":"int_avoidance"},{"label":"I asked someone for help or input","value":"int_collaborative"},{"label":"I sat with it and figured it out alone","value":"int_solitary"}],"target":"A1_Q3_INT","signal":"axis1:internal" },
    { "id":"A1_Q2_EXT","parentId":"A1_D1","type":"question","text":"Somewhere in the middle of that frustration — was there a small moment where you actually had a choice? Even a tiny one?","options":[{"label":"Yes — I see it now, I just didn't take it","value":"ext_hindsight"},{"label":"I'm not sure — I couldn't see past the situation","value":"ext_blind"},{"label":"Not really — circumstances left me no room","value":"ext_none"},{"label":"Yes — and I did take it, actually","value":"ext_yes"}],"target":"A1_D3","signal":"axis1:external" },
    { "id":"A1_Q3_INT","parentId":"A1_Q2_INT","type":"question","text":"Here's a harder question: when today went well, what did you attribute it to?","options":[{"label":"My preparation and effort","value":"int_self"},{"label":"The team — we figured it out together","value":"int_team"},{"label":"Luck, honestly — it could have gone either way","value":"int_luck"},{"label":"A bit of everything","value":"int_mixed"}],"target":"A1_R_INT","signal":"axis1:internal" },
    { "id":"A1_D3","parentId":"A1_Q2_EXT","type":"decision","text":null,"routing":[{"condition":"answer=ext_yes","target":"A1_R_EXT_SHIFT"},{"condition":"answer=ext_hindsight|ext_blind|ext_none","target":"A1_R_EXT"}],"signal":null },
    { "id":"A1_R_INT","parentId":"A1_Q3_INT","type":"reflection","text":"You stayed in the driver's seat today — even when the road was rough. That's not a small thing.\n\nAgency doesn't mean everything went right. It means you kept looking for what you could do, not just what was being done to you. That instinct is worth noticing.","options":[],"target":"BRIDGE_1_2","signal":null },
    { "id":"A1_R_EXT","parentId":"A1_D3","type":"reflection","text":"A hard day pulls your attention outward — to what others did or didn't do, to what circumstances allowed. That's honest.\n\nBut somewhere in there, you were making micro-decisions: where to look, how to respond, what to say or not say. Those count. You may have had more hand in today than it felt like.","options":[],"target":"BRIDGE_1_2","signal":null },
    { "id":"A1_R_EXT_SHIFT","parentId":"A1_D3","type":"reflection","text":"You found it — the small moment of choice inside the difficulty. That's actually the whole game.\n\nMost agency isn't a dramatic pivot; it's a quiet decision you almost didn't notice you were making. You noticed. That matters.","options":[],"target":"BRIDGE_1_2","signal":"axis1:internal" },
    { "id":"BRIDGE_1_2","parentId":null,"type":"bridge","text":"Now let's shift the lens — from how you handled today, to what you gave.","options":[],"target":"A2_Q1","signal":null },
    { "id":"A2_Q1","parentId":"BRIDGE_1_2","type":"question","text":"Think about one interaction you had today — with a colleague, a manager, a client, anyone. What was most on your mind?","options":[{"label":"Whether I was being heard or recognized","value":"ent_a"},{"label":"Whether I was actually helping them","value":"con_a"},{"label":"Getting through it and moving on","value":"ent_b"},{"label":"What they needed from me in that moment","value":"con_b"}],"target":null,"signal":null },
    { "id":"A2_D1","parentId":"A2_Q1","type":"decision","text":null,"routing":[{"condition":"answer=con_a|con_b","target":"A2_Q2_CON"},{"condition":"answer=ent_a|ent_b","target":"A2_Q2_ENT"}],"signal":null },
    { "id":"A2_Q2_CON","parentId":"A2_D1","type":"question","text":"Did you do anything today that wasn't technically your job — but you did it anyway?","options":[{"label":"Yes — helped someone who was struggling","value":"con_extra"},{"label":"Yes — took on something unglamorous that needed doing","value":"con_unglamorous"},{"label":"Not really — I focused on what was mine","value":"con_mine"},{"label":"I wanted to, but didn't get there","value":"con_intent"}],"target":"A2_D2","signal":"axis2:contribution" },
    { "id":"A2_Q2_ENT","parentId":"A2_D1","type":"question","text":"When you think about what you put in today versus what you got back — how did that feel?","options":[{"label":"Fair — roughly balanced","value":"ent_fair"},{"label":"I gave more than I got — and it's frustrating","value":"ent_frustrated"},{"label":"I'm not sure I gave that much, honestly","value":"ent_honest"},{"label":"I don't think in those terms much","value":"ent_neutral"}],"target":"A2_D3","signal":"axis2:entitlement" },
    { "id":"A2_D2","parentId":"A2_Q2_CON","type":"decision","text":null,"routing":[{"condition":"answer=con_extra|con_unglamorous","target":"A2_R_CON_HIGH"},{"condition":"answer=con_mine|con_intent","target":"A2_R_CON_MED"}],"signal":null },
    { "id":"A2_D3","parentId":"A2_Q2_ENT","type":"decision","text":null,"routing":[{"condition":"answer=ent_honest","target":"A2_R_ENT_HONEST"},{"condition":"answer=ent_fair|ent_frustrated|ent_neutral","target":"A2_R_ENT"}],"signal":null },
    { "id":"A2_R_CON_HIGH","parentId":"A2_D2","type":"reflection","text":"You gave without a ledger. That's rarer than it sounds — most people help when it's visible, when it counts on paper.\n\nYou helped because something needed doing, or someone needed support. That kind of discretionary effort is what actually holds teams together.","options":[],"target":"BRIDGE_2_3","signal":"axis2:contribution" },
    { "id":"A2_R_CON_MED","parentId":"A2_D2","type":"reflection","text":"You were present for your own work today — that's legitimate.\n\nBut there's a version of tomorrow where you also catch one moment where someone else needed something small. Not martyrdom. Just one extra move that wasn't required.","options":[],"target":"BRIDGE_2_3","signal":"axis2:contribution" },
    { "id":"A2_R_ENT","parentId":"A2_D3","type":"reflection","text":"Keeping score isn't always wrong — feeling undervalued is real. But when the focus sharpens on what's owed rather than what's given, the day tends to feel smaller.\n\nNot a judgment; just a pattern worth noticing. What's one thing you gave today that you haven't counted yet?","options":[],"target":"BRIDGE_2_3","signal":"axis2:entitlement" },
    { "id":"A2_R_ENT_HONEST","parentId":"A2_D3","type":"reflection","text":"That's a remarkably honest answer. Most people don't say that — they find a way to make the ledger look better.\n\nNoticing a day where you held back is the first step toward a day where you don't. No shame in it.","options":[],"target":"BRIDGE_2_3","signal":"axis2:entitlement" },
    { "id":"BRIDGE_2_3","parentId":null,"type":"bridge","text":"One last shift — outward. You've looked at how you handled the day, and what you gave. Now: who else was in the picture?","options":[],"target":"A3_Q1","signal":null },
    { "id":"A3_Q1","parentId":"BRIDGE_2_3","type":"question","text":"When you think about today's biggest challenge — who comes to mind first?","options":[{"label":"Just me — it was mine to solve","value":"self_a"},{"label":"My team — we were all caught in it","value":"team_a"},{"label":"A specific colleague who had it harder than me","value":"other_a"},{"label":"The person or group we're ultimately serving","value":"mission_a"}],"target":null,"signal":null },
    { "id":"A3_D1","parentId":"A3_Q1","type":"decision","text":null,"routing":[{"condition":"answer=self_a","target":"A3_Q2_SELF"},{"condition":"answer=team_a","target":"A3_Q2_TEAM"},{"condition":"answer=other_a|mission_a","target":"A3_Q2_OTHER"}],"signal":null },
    { "id":"A3_Q2_SELF","parentId":"A3_D1","type":"question","text":"Fair — some challenges are solitary. But somewhere today, did anyone else depend on how you came through?","options":[{"label":"Yes — and I thought about that while working through it","value":"self_aware"},{"label":"Probably yes, but I didn't think about it in the moment","value":"self_unaware"},{"label":"Not really — my work is pretty independent","value":"self_isolated"},{"label":"I'm not sure — I should think about this more","value":"self_curious"}],"target":"A3_D2","signal":"axis3:self" },
    { "id":"A3_Q2_TEAM","parentId":"A3_D1","type":"question","text":"You held the team in mind. In that difficulty — was there anything you could have done to make it lighter for someone else? Even slightly?","options":[{"label":"Yes — and I did it","value":"team_did"},{"label":"Yes — but I was too stretched myself","value":"team_missed"},{"label":"I tried but it didn't land the way I hoped","value":"team_tried"},{"label":"I was managing my own part","value":"team_unsure"}],"target":"A3_D3","signal":"axis3:team" },
    { "id":"A3_Q2_OTHER","parentId":"A3_D1","type":"question","text":"You reached past yourself — to someone specific, or to the mission itself. Did that perspective change anything about how you showed up?","options":[{"label":"Yes — it gave me some energy I didn't have","value":"other_energized"},{"label":"Yes — I was less focused on my own discomfort","value":"other_less_self"},{"label":"Not consciously, but I see it now","value":"other_hindsight"},{"label":"Not really — the situation still felt overwhelming","value":"other_overwhelmed"}],"target":"A3_D4","signal":"axis3:other" },
    { "id":"A3_D2","parentId":"A3_Q2_SELF","type":"decision","text":null,"routing":[{"condition":"answer=self_aware","target":"A3_R_SELF_SHIFT"},{"condition":"answer=self_unaware|self_isolated|self_curious","target":"A3_R_SELF"}],"signal":null },
    { "id":"A3_D3","parentId":"A3_Q2_TEAM","type":"decision","text":null,"routing":[{"condition":"answer=team_did|team_tried","target":"A3_R_TEAM_HIGH"},{"condition":"answer=team_missed|team_unsure","target":"A3_R_TEAM_MED"}],"signal":null },
    { "id":"A3_D4","parentId":"A3_Q2_OTHER","type":"decision","text":null,"routing":[{"condition":"answer=other_energized|other_less_self","target":"A3_R_OTHER_HIGH"},{"condition":"answer=other_hindsight|other_overwhelmed","target":"A3_R_OTHER_MED"}],"signal":null },
    { "id":"A3_R_SELF","parentId":"A3_D2","type":"reflection","text":"A lot of work happens in a private frame — just you and the problem. That's fine.\n\nBut the people around you are running their own private frames too. One thing worth trying tomorrow: once during the day, ask yourself who else this affects. Not to take on their burden — just to widen the picture slightly.","options":[],"target":"SUMMARY","signal":"axis3:self" },
    { "id":"A3_R_SELF_SHIFT","parentId":"A3_D2","type":"reflection","text":"You kept others in the picture even while solving a problem that felt personal.\n\nThat's not nothing — that's the kind of context-awareness that turns individual effort into something that matters beyond the task.","options":[],"target":"SUMMARY","signal":"axis3:team" },
    { "id":"A3_R_TEAM_HIGH","parentId":"A3_D3","type":"reflection","text":"You tried to make the load lighter for someone — whether or not it worked. That instinct to reach toward others when things are hard is worth recognizing.\n\nIt's what makes teams actually function under pressure, not just when things are easy.","options":[],"target":"SUMMARY","signal":"axis3:team" },
    { "id":"A3_R_TEAM_MED","parentId":"A3_D3","type":"reflection","text":"Being stretched yourself makes it hard to hold anyone else. That's real.\n\nBut noticing it — even now — is the beginning of something. Tomorrow, you might catch one moment where you have just a little capacity to spare.","options":[],"target":"SUMMARY","signal":"axis3:team" },
    { "id":"A3_R_OTHER_HIGH","parentId":"A3_D4","type":"reflection","text":"You discovered something Maslow spent his later career pointing at: when you orient toward someone or something beyond yourself, the weight of your own situation becomes more bearable.\n\nNot because it disappeared — because it found a context. That's transcendence. Not mystical; practical.","options":[],"target":"SUMMARY","signal":"axis3:other" },
    { "id":"A3_R_OTHER_MED","parentId":"A3_D4","type":"reflection","text":"You reached outward, even when the situation was still hard. That matters more than the outcome.\n\nPerspective-taking is a practice. Some days it shifts everything. Some days it barely makes a dent. Today might have been one of the harder days. That's okay.","options":[],"target":"SUMMARY","signal":"axis3:other" },
    { "id":"SUMMARY","parentId":null,"type":"summary","text":"Today, you leaned {axis1.label} on agency, {axis2.label} on contribution, and {axis3.label} in your radius of concern.\n\n{summary_reflection}",
      "summary_templates":{
        "internal+contribution+other":"You showed up with intention today — you took ownership, gave without keeping score, and held others in mind. Days like this are the ones worth building from.",
        "internal+contribution+team":"You kept both your own agency and your team's wellbeing in frame today. That combination — personal accountability plus collective care — is the foundation of good work.",
        "internal+contribution+self":"You took ownership and gave effort, even if today's radius stayed close. There's a version of tomorrow where you extend that same accountability outward.",
        "internal+entitlement+other":"There's an interesting tension in your day: you stayed in the driver's seat on your own challenge, but still found yourself thinking about others' stakes. That outward instinct is worth following.",
        "internal+entitlement+team":"You navigated your own situation well. The next layer: noticing the team's situation with the same energy you brought to your own.",
        "internal+entitlement+self":"You stayed in control today. The opportunity is to bring that same agency to the question of what you gave — not just how you managed.",
        "external+contribution+other":"You gave even when the day felt like it was happening to you — and you kept others in mind through it. That generosity under pressure is genuinely rare.",
        "external+contribution+team":"Even on a day when you felt buffeted by circumstances, you still thought about what you could give. That's worth more than it sounds.",
        "external+contribution+self":"You gave effort today, even when circumstances felt beyond your control. Tomorrow: one moment where you notice a choice, however small.",
        "external+entitlement+other":"The day pulled your attention to what wasn't working — but you still reached toward others in the middle of it. That instinct is something to trust.",
        "external+entitlement+team":"A tough day. The scorecard felt unbalanced, the control felt out of reach. But you're here, reflecting — that's already one choice you made.",
        "external+entitlement+self":"Today was hard, and it mostly felt like something being done to you. That happens. But you're sitting with it now, which means tomorrow you get to start differently."
      },
      "options":[],"target":"END","signal":null },
    { "id":"END","parentId":"SUMMARY","type":"end","text":"That's today. You thought about it honestly — that's more than most people do. See you tomorrow.","options":[],"target":null,"signal":null }
  ]
};

// ============================================================
// ENGINE
// ============================================================

class ReflectionEngine {
  constructor(tree) {
    this.tree = tree;
    this.nodes = {};
    tree.nodes.forEach(n => this.nodes[n.id] = n);
    this.state = this.initialState();
  }

  initialState() {
    return {
      answers: {},       // nodeId -> answer value
      signals: {         // axis counts
        axis1: { internal: 0, external: 0 },
        axis2: { contribution: 0, entitlement: 0 },
        axis3: { self: 0, team: 0, other: 0 }
      },
      currentNodeId: 'START',
      history: []
    };
  }

  reset() { this.state = this.initialState(); }

  currentNode() { return this.nodes[this.state.currentNodeId]; }

  recordSignal(signal) {
    if (!signal) return;
    const [axis, pole] = signal.split(':');
    if (this.state.signals[axis] && this.state.signals[axis][pole] !== undefined) {
      this.state.signals[axis][pole]++;
    }
  }

  dominantSignal(axis) {
    const s = this.state.signals[axis];
    if (!s) return null;
    const entries = Object.entries(s);
    entries.sort((a,b) => b[1] - a[1]);
    return entries[0][0]; // returns pole with highest tally
  }

  resolveDecision(node) {
    const lastAnswerNodeId = this.state.history[this.state.history.length - 1];
    const lastAnswer = this.state.answers[lastAnswerNodeId];
    for (const route of node.routing) {
      const [type, ...rest] = route.condition.split('=');
      if (type === 'answer') {
        const values = rest.join('=').split('|');
        if (values.includes(lastAnswer)) return route.target;
      }
      if (type === 'signal') {
        const [sigParts, comparator] = rest.join('=').split('>=');
        const [axis, pole] = sigParts.trim().split(':');
        if (this.state.signals[axis] && this.state.signals[axis][pole] >= parseInt(comparator)) {
          return route.target;
        }
      }
    }
    return node.routing[0].target; // fallback
  }

  advance(selectedValue) {
    const node = this.currentNode();

    // Record answer if question
    if (node.type === 'question' && selectedValue !== undefined) {
      this.state.answers[node.id] = selectedValue;
      this.state.history.push(node.id);
    }

    // Record signal
    this.recordSignal(node.signal);

    // Find next node
    let nextId = null;

    if (node.type === 'decision') {
      nextId = this.resolveDecision(node);
    } else if (node.target) {
      nextId = node.target;
    } else {
      // Find child nodes
      const children = this.tree.nodes.filter(n => n.parentId === node.id);
      if (children.length === 1) nextId = children[0].id;
    }

    if (nextId) {
      this.state.currentNodeId = nextId;
      // Auto-advance through decision nodes
      if (this.nodes[nextId] && this.nodes[nextId].type === 'decision') {
        return this.advance(undefined);
      }
    }

    return this.currentNode();
  }

  interpolate(text) {
    if (!text) return '';
    return text
      .replace(/\{([^}]+)\}/g, (_, key) => {
        const [nodeId, field] = key.split('.');
        if (field === 'answer') {
          const answer = this.state.answers[nodeId];
          if (!answer) return '...';
          const node = this.nodes[nodeId];
          if (node && node.options) {
            const opt = node.options.find(o => o.value === answer);
            if (opt) return opt.label.replace(/"/g, '');
          }
          return answer;
        }
        return key;
      });
  }

  buildSummaryText(node) {
    const axis1dom = this.dominantSignal('axis1');
    const axis2dom = this.dominantSignal('axis2');
    const axis3dom = this.dominantSignal('axis3');

    const axis1label = axis1dom === 'internal' ? 'toward agency' : 'toward external attribution';
    const axis2label = axis2dom === 'contribution' ? 'toward contribution' : 'toward entitlement';
    const axis3label = axis3dom === 'other' ? 'wide' : (axis3dom === 'team' ? 'toward your team' : 'close');

    const key = `${axis1dom}+${axis2dom}+${axis3dom}`;
    const reflection = node.summary_templates[key] || node.summary_templates['external+entitlement+self'];

    return {
      text: `Today, you leaned ${axis1label} on agency, ${axis2label} on contribution, and ${axis3label} in your radius of concern.\n\n${reflection}`,
      axis1: { label: axis1label, pole: axis1dom },
      axis2: { label: axis2label, pole: axis2dom },
      axis3: { label: axis3label, pole: axis3dom }
    };
  }
}

// ============================================================
// UI
// ============================================================

const engine = new ReflectionEngine(TREE);

const nodeText = document.getElementById('node-text');
const nodeTypeLabel = document.getElementById('node-type-label');
const optionsContainer = document.getElementById('options-container');
const continueBtn = document.getElementById('continue-btn');
const progressBar = document.getElementById('progress-bar');
const summaryAxes = document.getElementById('summary-axes');
const endScreen = document.getElementById('end-screen');
const card = document.getElementById('card');
const fadeOverlay = document.getElementById('fade-overlay');

const TOTAL_NODES_APPROX = 14; // avg path length
let nodeCount = 0;
let pendingAdvance = null;

function updateAxisDots(nodeId) {
  const dot1 = document.getElementById('dot-1');
  const dot2 = document.getElementById('dot-2');
  const dot3 = document.getElementById('dot-3');

  [dot1, dot2, dot3].forEach(d => { d.className = 'axis-dot'; });

  if (!nodeId) return;

  if (nodeId.startsWith('A1') || nodeId === 'A0_OPEN' || nodeId === 'A0_BRIDGE') {
    dot1.classList.add('active');
  } else if (nodeId.startsWith('A2') || nodeId === 'BRIDGE_1_2') {
    dot1.classList.add('done');
    dot2.classList.add('active');
  } else if (nodeId.startsWith('A3') || nodeId === 'BRIDGE_2_3') {
    dot1.classList.add('done');
    dot2.classList.add('done');
    dot3.classList.add('active');
  } else if (nodeId === 'SUMMARY' || nodeId === 'END') {
    dot1.classList.add('done');
    dot2.classList.add('done');
    dot3.classList.add('done');
  }
}

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('time-display').textContent = `${h}:${m}`;
}

setInterval(updateClock, 1000);
updateClock();

function typeLabels(type) {
  const labels = {
    start: 'opening',
    question: 'question',
    reflection: 'reflection',
    bridge: 'transition',
    summary: 'your day',
    end: 'closing'
  };
  return (labels[type] || type).toUpperCase();
}

function hideElements() {
  nodeText.classList.remove('visible');
  nodeTypeLabel.classList.remove('visible');
  optionsContainer.classList.remove('visible');
  continueBtn.classList.remove('visible');
  summaryAxes.style.display = 'none';
}

function renderNode(node) {
  if (!node) return;

  nodeCount++;
  progressBar.style.width = `${Math.min(95, (nodeCount / TOTAL_NODES_APPROX) * 100)}%`;
  updateAxisDots(node.id);

  hideElements();

  if (node.type === 'end') {
    setTimeout(() => {
      fadeOverlay.classList.add('active');
      setTimeout(() => {
        card.style.display = 'none';
        endScreen.style.display = 'block';
        progressBar.style.width = '100%';
        fadeOverlay.classList.remove('active');
      }, 350);
    }, 600);
    return;
  }

  setTimeout(() => {
    // Type label
    nodeTypeLabel.textContent = typeLabels(node.type);
    nodeTypeLabel.classList.add('visible');

    // Text content
    let displayText = engine.interpolate(node.text || '');

    if (node.type === 'summary') {
      const summary = engine.buildSummaryText(node);
      displayText = summary.text;

      // Build axis cards
      summaryAxes.innerHTML = `
        <div class="summary-axis-card">
          <div class="summary-axis-label">Locus</div>
          <div class="summary-axis-value">${summary.axis1.label}</div>
        </div>
        <div class="summary-axis-card">
          <div class="summary-axis-label">Orientation</div>
          <div class="summary-axis-value">${summary.axis2.label}</div>
        </div>
        <div class="summary-axis-card">
          <div class="summary-axis-label">Radius</div>
          <div class="summary-axis-value">${summary.axis3.label}</div>
        </div>`;
    }

    // Apply reflection styling
    if (node.type === 'reflection' || node.type === 'summary') {
      nodeText.className = 'reflection-card';
    } else {
      nodeText.className = '';
    }

    nodeText.textContent = '';
    nodeText.id = 'node-text';
    nodeText.textContent = displayText;
    nodeText.classList.add('visible');

    if (node.type === 'summary') {
      summaryAxes.style.display = 'flex';
    }

    // Options
    optionsContainer.innerHTML = '';

    if (node.type === 'question' && node.options && node.options.length > 0) {
      const letters = ['A', 'B', 'C', 'D', 'E'];
      node.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-label">${letters[i]}</span><span>${opt.label}</span>`;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          pendingAdvance = opt.value;
          continueBtn.classList.add('visible');
        });
        optionsContainer.appendChild(btn);
      });
      optionsContainer.classList.add('visible');

    } else if (['start', 'bridge', 'reflection', 'summary'].includes(node.type)) {
      continueBtn.classList.add('visible');
    }
  }, 50);
}

continueBtn.addEventListener('click', () => {
  const value = pendingAdvance;
  pendingAdvance = null;
  continueBtn.classList.remove('visible');

  fadeOverlay.classList.add('active');
  setTimeout(() => {
    hideElements();
    const next = engine.advance(engine.currentNode().type === 'question' ? value : undefined);

    // Handle auto-advance nodes (bridges etc.)
    if (next && (next.type === 'bridge' || next.type === 'start')) {
      engine.recordSignal(next.signal);
      const afterBridge = engine.advance(undefined);
      fadeOverlay.classList.remove('active');
      renderNode(afterBridge);
    } else {
      fadeOverlay.classList.remove('active');
      renderNode(next);
    }
  }, 350);
});

document.getElementById('restart-btn').addEventListener('click', () => {
  fadeOverlay.classList.add('active');
  setTimeout(() => {
    engine.reset();
    nodeCount = 0;
    endScreen.style.display = 'none';
    card.style.display = 'block';
    progressBar.style.width = '0%';
    fadeOverlay.classList.remove('active');
    renderNode(engine.currentNode());
  }, 350);
});

// Keyboard shortcut: Enter to continue
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && continueBtn.classList.contains('visible')) {
    continueBtn.click();
  }
});

// Initialize
(function init() {
  const startNode = engine.currentNode();
  // Auto-advance through START (it's just an intro, auto-continues)
  // Show start node first
  renderNode(startNode);
})();
</script>
